server:
  port: 8080
spring:
  application:
    name: "InterceptorPoc"
  devtools:
    add-properties: false
  profiles:
    include: "test"
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      probes:
        enabled: true
